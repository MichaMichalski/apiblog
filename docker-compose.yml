services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/prisma/data
      - uploads:/app/public/uploads
      - ./src/config:/app/src/config
    environment:
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-32-char-secret}
      - API_KEY=${API_KEY:-change-me-to-a-random-api-key}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped

volumes:
  db-data:
  uploads:
